<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Croc Transfer</title>
    <script>
      // Zero-flicker theme restore: apply cached CSS vars BEFORE any render.
      try {
        var cached = localStorage.getItem("m3-theme-vars");
        if (cached) {
          var vars = JSON.parse(cached);
          var s = document.documentElement.style;
          for (var k in vars) s.setProperty(k, vars[k]);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
