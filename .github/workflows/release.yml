name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "tauri-windows"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LanDrop ${{ github.ref_name }}"
          releaseBody: |
            See the [changelog](https://github.com/designer9999/LanDrop/commits/${{ github.ref_name }}) for details.

            ## Installation
            - **Windows**: Download and run the `.exe` installer
            - **Android**: Download the `.apk` and install
          releaseDraft: false
          prerelease: false

  build-macos:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "tauri-macos-${{ matrix.arch }}"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LanDrop ${{ github.ref_name }}"
          releaseBody: |
            See the [changelog](https://github.com/designer9999/LanDrop/commits/${{ github.ref_name }}) for details.

            ## Installation
            - **Windows**: Download and run the `.exe` installer
            - **macOS**: Download `.dmg` (arm64 for Apple Silicon, x64 for Intel)
            - **Linux**: Download `.AppImage` (works on any distro including Arch) or `.deb`

            **macOS first run**: If you see "LanDrop is damaged", run in terminal:
            `xattr -cr /Applications/LanDrop.app`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  build-linux:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "tauri-linux"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LanDrop ${{ github.ref_name }}"
          releaseBody: |
            See the [changelog](https://github.com/designer9999/LanDrop/commits/${{ github.ref_name }}) for details.

            ## Installation
            - **Windows**: Download and run the `.exe` installer
            - **Linux**: Download the `.AppImage` (works on any distro including Arch) or `.deb` for Debian/Ubuntu
          releaseDraft: false
          prerelease: false

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          cache-on-failure: true
          shared-key: "tauri-android"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Android APK
        run: npx tauri android build --debug --target aarch64 --apk --ci
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Prepare APK asset
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*debug.apk" | head -1)
          test -n "$APK"
          cp "$APK" landrop-android-universal-debug.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: landrop-android-universal-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
